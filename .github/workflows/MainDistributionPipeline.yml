#
# Build, test, and deploy the erpl_idoc DuckDB extension across platforms and
# DuckDB versions. Binaries are published to the erpl channel (get.erpl.io) on
# pushes to main and on version tags — same flow as erpl / erpl-web.
#
name: Main Extension Distribution Pipeline
on:
  push:
    paths-ignore:
      - '**/README.md'
      - 'assets/**'
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write  # required for AWS OIDC in the deploy job
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  # Fast, DuckDB-free unit tests for the pure IDoc format core (no SAP, no vcpkg).
  core-tests:
    name: Format core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Compile and run format-core tests
        run: make core_tests_format

  # ---- DuckDB v1.5.4 ---------------------------------------------------------
  duckdb-v154-build:
    name: Build & test (v1.5.4)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: erpl_idoc
      vcpkg_commit: 84bab45d415d22042bd0b9081aea57f362da3f35
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads;'
      # GCC 14+ (the rolling ci-tools Linux image) emits STB_GNU_UNIQUE defs for
      # ODR-used DuckDB class statics, which collide with core's strong defs at link
      # (fails duckdb's own tools/plan_serializer). Apply -fno-gnu-unique globally on
      # GCC so they become weak COMDAT defs. Injected into extension_config.cmake, which
      # is include()'d at top-level scope before add_subdirectory(src/tools/extension).
      extra_extension_config: |
        if(CMAKE_CXX_COMPILER_ID STREQUAL "GNU")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -fno-gnu-unique")
        endif()

  duckdb-v154-deploy:
    name: Deploy (v1.5.4)
    needs: duckdb-v154-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.5.4
      extension_name: erpl_idoc
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads;'
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}

  # ---- DuckDB v1.4.5 (latest-2 support window) -------------------------------
  duckdb-v145-build:
    name: Build & test (v1.4.5)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4-andium
    with:
      duckdb_version: v1.4.5
      ci_tools_version: v1.4-andium
      extension_name: erpl_idoc
      vcpkg_commit: ce613c41372b23b1f51333815feb3edd87ef8a8b
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads;'
      # See v1.5.4 job: apply -fno-gnu-unique globally on GCC to avoid STB_GNU_UNIQUE
      # multiple-definition link errors (duckdb tools/plan_serializer) on GCC 14+.
      extra_extension_config: |
        if(CMAKE_CXX_COMPILER_ID STREQUAL "GNU")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -fno-gnu-unique")
        endif()

  duckdb-v145-deploy:
    name: Deploy (v1.4.5)
    needs: duckdb-v145-build
    uses: ./.github/workflows/_extension_deploy.yml
    secrets: inherit
    with:
      duckdb_version: v1.4.5
      extension_name: erpl_idoc
      exclude_archs: 'windows_amd64_rtools;windows_amd64_mingw;wasm_mvp;wasm_eh;wasm_threads;'
      deploy_latest: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
      deploy_versioned: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
